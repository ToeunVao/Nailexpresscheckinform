<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Nail Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div id="message-container" class="text-center p-8 bg-white rounded-2xl shadow-xl max-w-lg mx-auto">
        <i class="fas fa-spinner fa-spin text-4xl text-pink-600"></i>
        <h1 class="text-2xl font-bold text-gray-800 mt-4">Verifying your payment...</h1>
        <p class="text-gray-500">Please do not close this window.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, addDoc, doc, setDoc, collection, serverTimestamp, Timestamp, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGZBJFVi_o1HeGDmjcSsmCcWxWOkuLc_4",
            authDomain: "nailexpress-10f2f.firebaseapp.com",
            projectId: "nailexpress-10f2f",
            storageBucket: "nailexpress-10f2f.appspot.com",
            messagingSenderId: "1015991996673",
            appId: "1:1015991996673:web:b6e8888abae83906d34b00"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messageContainer = document.getElementById('message-container');

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');
            const type = urlParams.get('type');
            const pendingData = JSON.parse(sessionStorage.getItem('pendingPayment'));

            if (!sessionId || !type || !pendingData || pendingData.sessionId !== sessionId) {
                messageContainer.innerHTML = `<h1 class="text-2xl font-bold text-red-500">Error</h1><p>Invalid session. Could not process order.</p><a href="index.html">Return Home</a>`;
                return;
            }

            try {
                if (type === 'ecommerce') {
                    await addDoc(collection(db, "orders"), pendingData.order);
                } else if (type === 'giftcard') {
                    const batch = writeBatch(db);
                    for (let i = 0; i < pendingData.details.quantity; i++) {
                        const newCardRef = doc(collection(db, "gift_cards"));
                        // Add a unique code for each card in a multi-quantity purchase
                        const cardData = { ...pendingData.details.cardData, code: `GC-${Date.now()}-${i}` };
                        batch.set(newCardRef, cardData);
                    }
                    await batch.commit();
                } else if (type === 'membership') {
                    await updateDoc(doc(db, "clients", pendingData.clientId), { membership: pendingData.membershipData });
                }

                sessionStorage.removeItem('pendingPayment');
                messageContainer.innerHTML = `
                    <i class="fas fa-check-circle text-4xl text-green-500"></i>
                    <h1 class="text-2xl font-bold text-gray-800 mt-4">Payment Successful!</h1>
                    <p class="text-gray-500">Thank you for your purchase. Your order has been confirmed.</p>
                    <a href="index.html" class="mt-4 inline-block bg-pink-600 text-white font-semibold py-2 px-6 rounded-lg">Return Home</a>`;
            } catch (error) {
                console.error("Error processing payment success:", error);
                messageContainer.innerHTML = `<h1 class="text-2xl font-bold text-red-500">Order Processing Failed</h1><p>There was an issue saving your order. Please contact us.</p><a href="index.html">Return Home</a>`;
            }
        });
    </script>
</body>
</html>
